<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專業記帳 PWA</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; padding-bottom: 100px; }
        .active-tab { background-color: #3b82f6 !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="max-w-md mx-auto p-4">
        <header class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg">
                <p class="text-xs opacity-80">銀行餘額</p>
                <p class="text-xl font-bold" id="bankBal">$0</p>
            </div>
            <div class="bg-orange-500 text-white p-4 rounded-2xl shadow-lg">
                <p class="text-xs opacity-80">八達通餘額</p>
                <p class="text-xl font-bold" id="octopusBal">$0</p>
            </div>
        </header>

        <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <div class="space-y-4">
                <input type="number" id="amount" placeholder="HKD $0.00" class="w-full text-3xl font-bold p-2 text-center outline-none border-b-2 border-slate-50 focus:border-blue-400">
                
                <div>
                    <p class="text-sm text-slate-400 mb-2">類別</p>
                    <div class="flex gap-2 overflow-x-auto pb-2" id="mainCatGroup">
                        <button onclick="setMainCat('飲食')" class="main-cat active-tab bg-slate-100 px-4 py-2 rounded-xl whitespace-nowrap">🍱 飲食</button>
                        <button onclick="setMainCat('交通')" class="main-cat bg-slate-100 px-4 py-2 rounded-xl whitespace-nowrap">🚗 交通</button>
                        <button onclick="setMainCat('增值')" class="main-cat bg-slate-100 px-4 py-2 rounded-xl whitespace-nowrap">💰 增值</button>
                    </div>
                </div>

                <div id="subCatContainer">
                    <p class="text-sm text-slate-400 mb-2">細項</p>
                    <div class="flex gap-2 overflow-x-auto pb-2" id="subCatGroup"></div>
                </div>

                <div id="paymentContainer">
                    <p class="text-sm text-slate-400 mb-2">付款方式</p>
                    <div class="flex gap-2 overflow-x-auto pb-2" id="payMethodGroup">
                        <button onclick="setPayMethod('Apple Pay')" class="pay-method active-tab bg-slate-100 px-4 py-2 rounded-xl whitespace-nowrap"> Apple Pay</button>
                        <button onclick="setPayMethod('八達通')" class="pay-method bg-slate-100 px-4 py-2 rounded-xl whitespace-nowrap">💳 八達通</button>
                        <button onclick="setPayMethod('銀行轉帳')" class="pay-method bg-slate-100 px-4 py-2 rounded-xl whitespace-nowrap">🏦 銀行</button>
                    </div>
                </div>

                <button onclick="submitRecord()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl active:bg-slate-700 transition-colors">儲存交易</button>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">歷史紀錄</h2>
                <button onclick="resetData()" class="text-xs text-red-400">重設所有資料</button>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </section>
    </div>

    <script>
        // 資料結構
        let data = JSON.parse(localStorage.getItem('myFinanceData')) || {
            bank: 10000,
            octopus: 200,
            records: []
        };

        const config = {
            '飲食': ['早餐', '午餐', '下午茶', '晚餐', '零食'],
            '交通': ['巴士/地鐵', '的士', '泊車'],
            '增值': ['八達通增值', '存入銀行']
        };

        let current = { main: '飲食', sub: '早餐', pay: 'Apple Pay' };

        function setMainCat(cat) {
            current.main = cat;
            updateUI();
            // 自動選取第一個子類
            current.sub = config[cat][0];
            renderSubCats();
        }

        function renderSubCats() {
            const group = document.getElementById('subCatGroup');
            group.innerHTML = config[current.main].map(s => 
                `<button onclick="current.sub='${s}';renderSubCats();" class="px-4 py-2 rounded-xl whitespace-nowrap ${current.sub===s?'active-tab':'bg-slate-100'}">${s}</button>`
            ).join('');
        }

        function setPayMethod(m) {
            current.pay = m;
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.main-cat').forEach(b => b.classList.toggle('active-tab', b.innerText.includes(current.main)));
            document.querySelectorAll('.pay-method').forEach(b => b.classList.toggle('active-tab', b.innerText.includes(current.pay)));
            document.getElementById('bankBal').innerText = `$${data.bank.toFixed(1)}`;
            document.getElementById('octopusBal').innerText = `$${data.octopus.toFixed(1)}`;
        }

        function submitRecord() {
            const amt = parseFloat(document.getElementById('amount').value);
            if (!amt) return;

            // 邏輯處理
            if (current.main === '增值' && current.sub === '八達通增值') {
                data.bank -= amt;
                data.octopus += amt;
            } else {
                // 一般支出
                if (current.pay === '八達通') data.octopus -= amt;
                else data.bank -= amt;
            }

            data.records.unshift({
                id: Date.now(),
                ...current,
                amount: amt,
                time: new Date().toLocaleString('zh-HK', {hour12:false})
            });

            save();
            document.getElementById('amount').value = '';
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = data.records.map(r => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                    <div>
                        <div class="font-bold">${r.main} - ${r.sub}</div>
                        <div class="text-xs text-slate-400">${r.time} · ${r.pay}</div>
                    </div>
                    <div class="text-right">
                        <div class="${r.main==='增值'?'text-green-500':'text-red-500'} font-bold">
                            ${r.main==='增值'?'+':'-'}$${r.amount}
                        </div>
                        <button onclick="deleteRec(${r.id})" class="text-[10px] text-slate-300">刪除</button>
                    </div>
                </div>
            `).join('');
            updateUI();
        }

        function save() { localStorage.setItem('myFinanceData', JSON.stringify(data)); }
        function deleteRec(id) {
            data.records = data.records.filter(r => r.id !== id);
            save(); renderHistory();
        }
        function resetData() {
            if(confirm('確定清除所有紀錄？')) {
                data = { bank: 0, octopus: 0, records: [] };
                save(); renderHistory();
            }
        }

        // Init
        renderSubCats();
        renderHistory();
    </script>
</body>
</html>

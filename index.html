<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的帳本</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; padding-bottom: 50px; }
        .active-tab { background-color: #3b82f6 !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="max-w-md mx-auto p-4">
        <header class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg relative">
                <p class="text-xs opacity-80">🏦 銀行現金</p>
                <p class="text-xl font-bold" id="bankBal">$0</p>
                <button onclick="adjustBank()" class="absolute top-2 right-2 text-[10px] bg-white/20 px-1 rounded">修正</button>
            </div>
            <div class="bg-orange-500 text-white p-4 rounded-2xl shadow-lg">
                <p class="text-xs opacity-80">💳 八達通</p>
                <p class="text-xl font-bold" id="octopusBal">$0</p>
            </div>
            <div class="bg-red-500 text-white p-4 rounded-2xl shadow-lg col-span-2 flex justify-between items-center">
                <div>
                    <p class="text-xs opacity-80">📉 截止目前卡數 (Apple Pay)</p>
                    <p class="text-xl font-bold" id="creditCardDebt">$0</p>
                </div>
                <button onclick="payCreditCard()" class="bg-white text-red-500 text-xs font-bold px-3 py-2 rounded-xl shadow-sm">交卡數</button>
            </div>
        </header>

        <section class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-6">
            <div class="space-y-4">
                <input type="number" id="amount" placeholder="HKD $0.00" class="w-full text-3xl font-bold p-2 text-center outline-none border-b-2 border-slate-50 focus:border-blue-400">
                
                <div>
                    <div class="flex gap-2 overflow-x-auto pb-2">
                        <button onclick="setMainCat('飲食')" class="main-cat active-tab bg-slate-100 px-4 py-2 rounded-xl whitespace-nowrap">🍱 飲食</button>
                        <button onclick="setMainCat('交通')" class="main-cat bg-slate-100 px-4 py-2 rounded-xl whitespace-nowrap">🚗 交通</button>
                        <button onclick="setMainCat('增值')" class="main-cat bg-slate-100 px-4 py-2 rounded-xl whitespace-nowrap">💰 增值/入錢</button>
                    </div>
                </div>

                <div id="subCatGroup" class="flex gap-2 overflow-x-auto pb-2"></div>

                <div>
                    <p class="text-sm text-slate-400 mb-2">付款方式</p>
                    <div class="flex gap-2 overflow-x-auto pb-2">
                        <button onclick="setPayMethod('Apple Pay')" class="pay-method active-tab bg-slate-100 px-4 py-2 rounded-xl"> Apple Pay</button>
                        <button onclick="setPayMethod('八達通')" class="pay-method bg-slate-100 px-4 py-2 rounded-xl text-orange-600">八達通</button>
                        <button onclick="setPayMethod('現金/銀行')" class="pay-method bg-slate-100 px-4 py-2 rounded-xl">現金/銀行</button>
                    </div>
                </div>

                <button onclick="submitRecord()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl active:scale-95 transition-transform">儲存交易</button>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4 text-slate-400">
                <h2 class="text-lg font-bold text-slate-700">歷史紀錄</h2>
                <button onclick="resetData()" class="text-xs">清除所有</button>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </section>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('myFinanceData_v2')) || {
            bank: 0,
            octopus: 0,
            debt: 0,
            records: []
        };

        const config = {
            '飲食': ['早餐', '午餐', '下午茶', '晚餐', '超市/買餸'],
            '交通': ['巴士/地鐵', '的士', '泊車/隧道'],
            '增值': ['八達通增值', '存入現金']
        };

        let current = { main: '飲食', sub: '早餐', pay: 'Apple Pay' };

        function setMainCat(cat) {
            current.main = cat;
            current.sub = config[cat][0];
            renderUI();
        }

        function setPayMethod(m) {
            current.pay = m;
            renderUI();
        }

        function adjustBank() {
            const val = prompt("請輸入目前的銀行實際餘額:", data.bank);
            if (val !== null) {
                data.bank = parseFloat(val) || 0;
                save();
                renderUI();
            }
        }

        function payCreditCard() {
            if (data.debt === 0) return alert("目前沒有卡數需要繳付。");
            if (confirm(`確定從銀行扣除 $${data.debt} 以繳付信用卡嗎？`)) {
                data.bank -= data.debt;
                data.debt = 0;
                data.records.unshift({
                    id: Date.now(),
                    main: '還款', sub: '交卡數', pay: '銀行轉帳',
                    amount: 0, time: new Date().toLocaleString(), isSystem: true
                });
                save();
                renderUI();
            }
        }

        function submitRecord() {
            const amt = parseFloat(document.getElementById('amount').value);
            if (!amt) return;

            // 核心邏輯
            if (current.main === '增值' && current.sub === '八達通增值') {
                data.bank -= amt;
                data.octopus += amt;
            } else if (current.main === '增值' && current.sub === '存入現金') {
                data.bank += amt;
            } else {
                // 支出邏輯
                if (current.pay === 'Apple Pay') {
                    data.debt += amt; // 增加卡數，不扣銀行
                } else if (current.pay === '八達通') {
                    data.octopus -= amt;
                } else {
                    data.bank -= amt;
                }
            }

            data.records.unshift({
                id: Date.now(), ...current, amount: amt,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });

            save();
            document.getElementById('amount').value = '';
            renderUI();
        }

        function renderUI() {
            // 更新數字
            document.getElementById('bankBal').innerText = `$${data.bank.toLocaleString()}`;
            document.getElementById('octopusBal').innerText = `$${data.octopus.toLocaleString()}`;
            document.getElementById('creditCardDebt').innerText = `$${data.debt.toLocaleString()}`;

            // 更新按鈕樣式
            document.querySelectorAll('.main-cat').forEach(b => b.classList.toggle('active-tab', b.innerText.includes(current.main)));
            document.querySelectorAll('.pay-method').forEach(b => b.classList.toggle('active-tab', b.innerText.includes(current.pay)));

            // 更新子分類
            const subGroup = document.getElementById('subCatGroup');
            subGroup.innerHTML = config[current.main].map(s => 
                `<button onclick="current.sub='${s}';renderUI();" class="px-4 py-2 rounded-xl whitespace-nowrap ${current.sub===s?'active-tab':'bg-slate-100'}">${s}</button>`
            ).join('');

            // 更新列表
            const list = document.getElementById('historyList');
            list.innerHTML = data.records.map(r => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                    <div>
                        <div class="font-bold text-sm">${r.main} - ${r.sub}</div>
                        <div class="text-[10px] text-slate-400">${r.time} · ${r.pay}</div>
                    </div>
                    <div class="text-right">
                        <div class="${(r.main==='增值'||r.main==='還款')?'text-green-500':'text-red-500'} font-bold">
                            ${r.main==='增值'?'+':'-'}$${r.amount}
                        </div>
                        <button onclick="deleteRec(${r.id})" class="text-[10px] text-slate-200">刪除</button>
                    </div>
                </div>
            `).join('');
        }

        function save() { localStorage.setItem('myFinanceData_v2', JSON.stringify(data)); }
        function deleteRec(id) { 
            if(confirm('刪除紀錄不會退回已扣除的餘額，確定嗎？')) {
                data.records = data.records.filter(r => r.id !== id); 
                save(); renderUI(); 
            }
        }
        function resetData() { if(confirm('重設所有資料？')) { data={bank:0,octopus:0,debt:0,records:[]}; save(); renderUI(); } }

        renderUI();
    </script>
</body>
</html>
